<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Meal timer</title>
    </head>
    <body>
        <div class="center">
            <h1>When should you eat!</h1>
            <fieldset>
                <legend>Time</legend>
                <label for="wakeupTime">What time do you wake up?</label>
                <input type="time" id="wakeupTime" name="wakeup time"/>
                <label for="sleepTime">What time do you go to sleep?</label>
                <input type="time" id="sleepTime" name="sleep time"/>
                <label for="exerciseTime">What time do you exercise?</label>
                <input type="time" id="exerciseTime" name="exercise time"/>
                <button type="button" id="calculateButton">Calculate</button>
            </fieldset>
            <div id="results"></div>
        </div>
            <script src="script.js"></script>
    </body>
</html>
